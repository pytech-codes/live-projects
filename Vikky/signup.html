<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Online Hotel Reservation System</title>
    <meta name="description" content="Create an account to book rooms faster. Join our hotel reservation system for a seamless booking experience.">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page" data-mode="signup">
    <div class="auth-split">
        <div class="auth-left">
            <div class="auth-inner">
                <a class="auth-back" href="index.html">Back to Home</a>

                <h1 class="auth-heading">Sign Up</h1>
                <p class="auth-sub">Create an account to book rooms faster.</p>

                <div class="auth-tabs" role="tablist" aria-label="Auth tabs">
                    <a class="auth-tab login-tab" href="login.html">Login</a>
                    <a class="auth-tab signup-tab" href="signup.html">Sign Up</a>
                </div>

                <form class="form auth-form" id="signupForm" action="#" autocomplete="on">
                    <div class="field">
                        <label for="signupName">Full Name</label>
                        <input id="signupName" type="text" placeholder="Your name" required>
                    </div>

                    <div class="field">
                        <label for="signupEmail">Email</label>
                        <input id="signupEmail" type="email" placeholder="your-email@gmail.com" required>
                    </div>

                    <div class="field">
                        <label for="signupPassword">Password</label>
                        <input id="signupPassword" type="password" placeholder="Create a password" required>
                    </div>

                    <div class="field">
                        <label for="signupConfirm">Confirm Password</label>
                        <input id="signupConfirm" type="password" placeholder="Repeat your password" required>
                    </div>

                    <button class="auth-btn" type="submit">Create Account</button>
                </form>
            </div>
        </div>

        <div class="auth-right" aria-hidden="true"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
